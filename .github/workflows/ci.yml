# This workflow provisions AWS infrastructure using Terraform and configures the resulting
# instance using Ansible. It requires the following environment variables and secrets
# configured in the GitHub repository settings (Settings > Secrets and Variables > Actions):
#
# Variables:
#   - AWS_EC2_INSTANCE_TYPE (optional): The type of the AWS instance to provision (ex.
#       t3.large). Omitting this value should fallback to the Terraform variable default.
#   - AWS_EC2_KEY_PAIR_NAME: The *name* of an existing EC2 key pair to use when provisioning
#       the EC2 instances. Allows SSH access.
#   - AWS_ROLE_ARN_TO_ASSUME: The Role ARN which is the output `assumed_role_arn` from
#       running the Terraform baseline infrastructure in `terraform/base`.
#   - AWS_REGION: The region into which to deploy the application.
#   - AWS_ROUTE53_HOSTED_ZONE_ID: The ID of the hosted zone under which the DNS records for
#       the application will be managed. This value should be the output `dns_zone_id` from
#       running the Terraform baseline infrastructure in `terraform/base`.
#   - AWS_S3_TERRAFORM_STATE_BUCKET_NAME: The S3 bucket name which is the output
#       `terraform_state_bucket_name` from running the Terraform baseline infrastructure in
#       `terraform/base`.
#   - AWS_S3_TERRAFORM_STATE_OBJECT_KEY: The name of the *file* which will hold the Terraform
#       state inside the above bucket.
#   - HOSTNAME: The hostname of the application (ex. api.savingsatoshi.com).
#   - MAX_SCRIPT_EXECUTION_TIME (optional): The application config value in milliseconds for
#       REPL container timeouts.
#   - PORT (optional): The application config value for the server listening port.
#   - WHITELIST (optional): The application config value as a comma-separated list defining
#       which allowed Origin headers are allowed to access the API.
#
# Secrets:
#   - AWS_EC2_SSH_PRIVATE_KEY: The SSH private key corresponding to the above key pair name
#       which will be used by Ansible to SSH into the instance and perform its operations.
#   - DATABASE_URL: The application config value for the connection string to the database.
#   - SECRET: The application config value for the encryption secret used in authentication.

name: CI
on:
  pull_request:
    branches:
      - master
      - develop
  push:
    branches:
      - master
      - develop
      - feature/staging-environment
  workflow_dispatch: {}

env:
  ANSIBLE_WORKING_DIR: ansible
  TERRAFORM_WORKING_DIR: terraform
  TF_VAR_hosted_zone_id: ${{ vars.AWS_ROUTE53_HOSTED_ZONE_ID }}
  TF_VAR_hostname: ${{ vars.HOSTNAME }}
  TF_VAR_instance_type: ${{ vars.AWS_EC2_INSTANCE_TYPE }}
  TF_VAR_key_pair_name: ${{ vars.AWS_EC2_KEY_PAIR_NAME }}

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # TODO: Select a TypeScript linter and add a check.

      # Terraform checks
      - uses: hashicorp/setup-terraform@v3
        name: Setup Terraform
      - name: Terraform Format
        run: terraform fmt -check
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
      - name: Terraform Format (base)
        run: terraform fmt -check
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}/base

  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: check
    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postgres?schema=public"

    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'yarn'

      - name: Install Yarn
        run: yarn install

      - name: Build application
        run: yarn build

      - name: Generate Prisma Client
        run: yarn db:generate

      - name: Run Database Migrations
        run: yarn db:migrate:production
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Javascript REPL image
        uses: docker/build-push-action@v6
        with:
          context: src/base_images/javascript
          load: true
          no-cache: true
          push: false
          tags: js-base:latest

      - name: Build Python REPL image
        uses: docker/build-push-action@v6
        with:
          context: src/base_images/python
          load: true
          no-cache: true
          push: false
          tags: py-base:latest

      - name: Run tests with coverage
        run: yarn test
        env:
          NODE_ENV: test
          DATABASE_URL: ${{ env.DATABASE_URL }}
          # Shorten timeout to 5 seconds
          MAX_SCRIPT_EXECUTION_TIME: 5000
          SECRET: test-secret

  deploy:
    name: Deploy
    environment: "${{
      github.ref_name == 'master' && 'production' ||
      github.ref_name == 'develop' && 'staging' ||
      'unknown'
    }}"
    if: ${{ github.ref_name == 'master' || github.ref_name == 'develop' }}
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: aws-actions/configure-aws-credentials@v5
        name: Configure AWS Credentials
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      # Terraform
      - uses: hashicorp/setup-terraform@v3
        name: Setup Terraform
      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.AWS_S3_TERRAFORM_STATE_BUCKET_NAME }}" \
            -backend-config="key=${{ vars.AWS_S3_TERRAFORM_STATE_OBJECT_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve
          echo "TERRAFORM_APPLY_OUTPUT_IP_ADDRESS=$(terraform output -raw ip_address)" \
            >> $GITHUB_ENV
        working-directory: ${{ env.TERRAFORM_WORKING_DIR }}

      # Ansible
      - name: Install Ansible Dependencies
        run: |
          sudo apt-get install -y ansible
          ansible-galaxy install -r ${{ env.ANSIBLE_WORKING_DIR }}/requirements.yaml

          # SSH
          mkdir ~/.ssh
          cat <<'EOF' > ~/.ssh/ec2.pem
          ${{ secrets.AWS_EC2_SSH_PRIVATE_KEY }}
          EOF
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H ${{ env.TERRAFORM_APPLY_OUTPUT_IP_ADDRESS }} >> ~/.ssh/known_hosts

          # Environment
          cat <<'EOF' > ${{ github.workspace }}/.env
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          MAX_SCRIPT_EXECUTION_TIME=${{ env.MAX_SCRIPT_EXECUTION_TIME || '10000' }}
          PORT=${{ env.PORT || '8000' }}
          SECRET=${{ secrets.SECRET }}
          WHITELIST=${{ env.WHITELIST || 'https://savingsatoshi.com' }}
          EOF
      - uses: dawidd6/action-ansible-playbook@v5
        name: Run Ansible Playbook
        with:
          playbook: playbook.yaml
          directory: ${{ env.ANSIBLE_WORKING_DIR }}
          inventory: |
            app:
              hosts:
                ${{ env.TERRAFORM_APPLY_OUTPUT_IP_ADDRESS }}:
                  ansible_user: ubuntu
                  ansible_ssh_private_key_file: "~/.ssh/ec2.pem"
                  aws_region: ${{ vars.AWS_REGION }}
                  hostname: ${{ vars.HOSTNAME }}
                  cert_email: ${{ vars.CERT_EMAIL }}
                  env_config: ${{ github.workspace }}/.env
